[pytest]
addopts = -ra -n auto --use-mcp --reruns 1 --reruns-delay 1 --alluredir=reports/allure --junitxml=reports/junit-report.xml --html=reports/report.html --self-contained-html
testpaths = test_suites/
python_files = test_*.py *_test.py
bdd_features_base_dir = test_suites/bdd/features/
markers =
    smoke: smoke / critical path tests (fast, run on every PR)
    regression: full regression suite
    api: API-layer / backend tests
    ui: UI-layer / browser automation tests
    e2e: end-to-end user journey tests
    negative: negative test cases
    edge: edge case scenarios
    performance: performance-related tests
    mcp: tests using MCP integration
junit_family = xunit2
