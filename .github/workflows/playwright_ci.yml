name: Playwright Python CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suite:
        description: Test scope to execute
        required: false
        default: all
        type: choice
        options:
          - all
          - ui
          - api
          - ui-bdd
          - api-bdd
          - smoke
          - regression
      environment:
        description: Framework environment override
        required: false
        default: staging
        type: choice
        options:
          - staging
          - dev
          - prod
      use_mcp:
        description: Enable MCP-tagged scenarios
        required: false
        default: false
        type: boolean

concurrency:
  group: playwright-python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run framework suite
    runs-on: ubuntu-latest
    env:
      CI: "true"
      ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}
      BASE_URL: ${{ vars.BASE_URL != '' && vars.BASE_URL || 'https://www.saucedemo.com' }}
      API_URL: ${{ vars.API_URL }}
      MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL != '' && vars.MCP_SERVER_URL || 'ws://localhost:8080' }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
      TESTRAIL_RUN_ID: ${{ vars.TESTRAIL_RUN_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Prepare report directories
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/screenshots
          mkdir -p reports/traces
          mkdir -p reports/videos

      - name: Run pytest
        shell: bash
        env:
          DISPATCH_SUITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.suite || 'all' }}
          DISPATCH_USE_MCP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_mcp || 'false' }}
        run: |
          set -euo pipefail

          args=()

          case "$DISPATCH_SUITE" in
            all)
              ;;
            ui)
              args+=(test_suites/ui test_suites/bdd/features/ui)
              ;;
            api)
              args+=(test_suites/api test_suites/bdd/features/api)
              ;;
            ui-bdd)
              args+=(test_suites/bdd/features/ui)
              ;;
            api-bdd)
              args+=(test_suites/bdd/features/api)
              ;;
            smoke)
              args+=(-m smoke)
              ;;
            regression)
              args+=(-m regression)
              ;;
            *)
              echo "Unsupported suite: $DISPATCH_SUITE" >&2
              exit 1
              ;;
          esac

          if [ "$DISPATCH_USE_MCP" = "true" ]; then
            args+=(--use-mcp)
          fi

          echo "Running framework suite against ENV=$ENV"
          printf 'python -m pytest'
          printf ' %q' "${args[@]}"
          printf '\n'

          python -m pytest "${args[@]}"

      - name: Publish run summary
        if: always()
        shell: bash
        env:
          DISPATCH_SUITE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.suite || 'all' }}
          DISPATCH_USE_MCP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_mcp || 'false' }}
        run: |
          {
            echo "## Playwright Python CI/CD"
            echo
            echo "- Environment: \`$ENV\`"
            echo "- Suite: \`$DISPATCH_SUITE\`"
            echo "- MCP enabled: \`$DISPATCH_USE_MCP\`"
            echo "- HTML report artifact: \`reports/index.html\`"
            echo "- JUnit XML artifact: \`reports/junit-report.xml\`"
            echo "- Allure raw results artifact: \`reports/allure-results/\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports and evidence
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: playwright-reports
          path: reports
          retention-days: 14
          if-no-files-found: warn

  deploy-report:
    name: Publish pytest HTML report
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4.2.1
        with:
          name: playwright-reports
          path: reports

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: reports

      - name: Deploy Pages site
        id: deployment
        uses: actions/deploy-pages@v4.0.5
